services:
  tg-watchbot:
    build:
      context: .
      args:
        APP_UID: ${TG_WATCHBOT_UID:-999}
        APP_GID: ${TG_WATCHBOT_GID:-994}
    container_name: tg-watchbot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./docker-data:/data
      - ./forwarder:/data/forwarder
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=67108864
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    init: true
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
  telegram-forwarder:
    image: heavrnl/telegramforwarder:latest
    container_name: telegram-forwarder
    profiles:
      - forwarder
    restart: unless-stopped
    env_file:
      - path: ./forwarder/.env
        required: false
    ports:
      - "9804:8000"
    volumes:
      - ./forwarder/db:/app/db
      - ./forwarder/logs:/app/logs
      - ./forwarder/sessions:/app/sessions
      - ./forwarder/temp:/app/temp
      - ./forwarder/ufb/config:/app/ufb/config
      - ./forwarder/config:/app/config
      - ./forwarder/rss/data:/app/rss/data
      - ./forwarder/rss/media:/app/rss/media
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    stdin_open: true
    tty: true
